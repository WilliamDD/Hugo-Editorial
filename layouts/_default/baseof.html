<html>

<head>
    {{- partial "head.html" . -}}
</head>

<body class="is-preload">
    <!-- Wrapper -->
    <div id="wrapper">
        <!-- Main -->
        <div id="main">
            <div class="inner">
                <!-- Header -->
                {{- partial "header.html" . -}}
                <!-- Content -->
                {{- block "main" . }}{{- end }}
            </div>
        </div>
        <!-- Sidebar -->
        <div id="sidebar">
            <div class="inner">
                <!-- Search -->
                {{- partial "search.html" . -}}
                <!-- Menu -->
                {{- partial "menu.html" . -}}
                <!-- Section -->
                {{- partial "mini-posts.html" . -}}
                <!-- Section -->
                {{- partial "contact.html" . -}}
                <!-- Footer -->
                {{- partial "footer.html" . -}}
            </div>
        </div>
    </div>
    <!-- Scripts -->
    {{- partial "scripts.html" . -}}
</body>

</html>
